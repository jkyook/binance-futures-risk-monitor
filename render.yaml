services:
  - type: web
    name: binance-futures-risk-monitor
    runtime: python
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python risk_report.py --serve --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
